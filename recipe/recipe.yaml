schema_version: 1

context:
  name: psims
  version: "1.3.6"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/psims-${{ version }}.tar.gz
  sha256: f63d5d7659a3cd87c2c604d0bb460f18c20816653747e355426e35ce91989447

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - lxml
    - six
    - sqlalchemy
    - numpy

tests:
  - python:
      imports:
        - psims
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: "Writers and controlled vocabulary manager for PSI-MS's mzML and mzIdentML standards"
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/mobiusklein/psims

extra:
  recipe-maintainers:
    - hadim
